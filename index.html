<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="p-3">
        <div class="container">
          <div
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
          >
            <a
              href="/"
              class="d-flex align-items-center mb-2 mb-lg-0 text-dark text-decoration-underline"
            >
              <svg
                class="bi me-2"
                width="110"
                height="72"
                role="img"
                aria-label="Bootstrap"
              >
                <use xlink:href="\images\logo-sound-mind.svg"></use>
              </svg>
            </a>
            <ul
              class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
            >
              <li><a href="#" class="nav-link px-2 text-black link-custom">Home</a></li>
              <li><a href="#" class="nav-link px-2 text-black link-custom">Para você</a></li>
              <li><a href="#" class="nav-link px-2 text-black link-custom">Para especialistas</a></li>
            </ul>
            <div class="text-end">
              <button type="button" class="btn btn-link text-black link-custom">Criar conta</button>
              <button type="button" class="btn btn-primary me-2 btn-custom">
                Agendar consulta
              </button>
              <button type="button" class="btn btn-primary btn-custom">Entrar</button>
            </div>
          </div>
        </div>
    </header>
    <!-- não editar - bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
